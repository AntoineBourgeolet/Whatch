name: Refresh series catalog

on:
  schedule:
    # Toutes les 6 heures: 32 requêtes/run, soit ~128 requêtes/jour
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-catalog:
    runs-on: ubuntu-latest
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh static catalog
        run: npm run pages:data

      - name: Commit updated catalog
        run: |
          if git diff --quiet -- public/data/series-catalog.json; then
            echo "No catalog changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/series-catalog.json
          git commit -m "chore: refresh series catalog"
          git push
